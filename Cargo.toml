[package]
name = "clove1db"
version = "0.0.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
chrono = "0.4.44"
dirs = "6.0.0"
include_dir = "0.7.4"
itertools = "0.14.0"
moka = { version = "0.12.14", features = ["future"] }
rayon = "1.11.0"
redb = "3.1.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["full", "rt-multi-thread"] }
walkdir = "2.5.0"
uuid = { version = "1.22.0", features = ["v4"] }